<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AssetFlow | Login</title>



<link rel="stylesheet" href="css/login.css">



<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">



<link rel="stylesheet"

href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">



</head>



<body>



<div class="container">



<div class="left">



<div class="logo">



<img src="images/logo.png">



<h2>AssetFlow</h2>



</div>



<h1>Enterprise Asset & Resource Management</h1>



<p>



Manage company assets,

employees,

maintenance,

resource booking

and reports from one dashboard.



</p>



<img src="images/login-bg.png" class="illustration">



</div>



<div class="right">



<div class="login-box">



<h2>Welcome Back 👋</h2>



<p>Login to continue</p>



<form action="dashboard.html">



<div class="input-box">



<i class="fa-solid fa-envelope"></i>



<input type="email"

placeholder="Email Address"

required>



</div>



<div class="input-box">



<i class="fa-solid fa-lock"></i>



<input type="password"

placeholder="Password"

required>



</div>



<div class="remember">



<label>



<input type="checkbox">



Remember Me



</label>



<a href="#">



Forgot Password?



</a>



</div>



<button>



Login



</button>



</form>



<div class="line">



<span>



OR



</span>



</div>



<button class="google">



<i class="fa-brands fa-google"></i>



Continue with Google



</button>



<p class="signup">



Don't have an account?



<a href="signup.html">



Create Account



</a>



</p>



</div>



</div>



</div>



<script src="js/login.js"></script>



</body>

</html
